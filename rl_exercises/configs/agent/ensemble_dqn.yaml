seed: 0

env:
  name: CartPole-v1

agent:
  buffer_capacity: 10000
  batch_size: 64
  learning_rate: 0.001
  gamma: 0.99

  epsilon_start: 0.2
  epsilon_final: 0.01
  epsilon_decay: 1000

  target_update_freq: 500
  hidden_dims: [128, 128]

  use_prioritized_replay: false
  use_double_dqn: true

  num_heads: 5
  ucb_beta: 1.0

train:
  num_frames: 20000
  eval_interval: 10
